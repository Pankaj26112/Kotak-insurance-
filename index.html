<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Subhash Kirana Store</title>
  <meta name="description" content="Subhash Kirana Store - Ghar baithe order karein" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0f0; display: flex; justify-content: center; }
    ::-webkit-scrollbar { width: 0; }
    input::placeholder { color: rgba(255,255,255,0.6); }
    input:focus { box-shadow: 0 0 0 2px rgba(168,216,122,0.5); }
    @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .pop { animation: pop 0.2s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const STORE_NAME = "Subhash Kirana Store";
    const WHATSAPP_NUMBER = "917206267615";

    const categories = [
      { id: "all", label: "🛒 Sab", color: "#2d5016" },
      { id: "atta-dal", label: "🌾 Atta-Dal", color: "#8B4513" },
      { id: "masale", label: "🌶️ Masale", color: "#CC3300" },
      { id: "tel-ghee", label: "🫙 Tel-Ghee", color: "#DAA520" },
      { id: "snacks", label: "🍿 Snacks", color: "#FF6B35" },
      { id: "beverages", label: "☕ Drinks", color: "#4A2C2A" },
      { id: "daily", label: "🧴 Daily Use", color: "#2E86AB" },
    ];

    const products = [
      { id: 1, name: "Aashirvaad Atta 5kg", price: 245, cat: "atta-dal", emoji: "🌾" },
      { id: 2, name: "Toor Dal 1kg", price: 145, cat: "atta-dal", emoji: "🫘" },
      { id: 3, name: "Chana Dal 1kg", price: 110, cat: "atta-dal", emoji: "🫘" },
      { id: 4, name: "Basmati Chawal 5kg", price: 380, cat: "atta-dal", emoji: "🍚" },
      { id: 5, name: "MDH Garam Masala 100g", price: 85, cat: "masale", emoji: "🌶️" },
      { id: 6, name: "Haldi Powder 200g", price: 55, cat: "masale", emoji: "🟡" },
      { id: 7, name: "Dhaniya Powder 200g", price: 45, cat: "masale", emoji: "🌿" },
      { id: 8, name: "Lal Mirch Powder 100g", price: 60, cat: "masale", emoji: "🔴" },
      { id: 9, name: "Fortune Sunflower Oil 1L", price: 155, cat: "tel-ghee", emoji: "🫙" },
      { id: 10, name: "Amul Ghee 500ml", price: 310, cat: "tel-ghee", emoji: "🧈" },
      { id: 11, name: "Dalda Vanaspati 1kg", price: 140, cat: "tel-ghee", emoji: "🫙" },
      { id: 12, name: "Kurkure Masala Munch", price: 20, cat: "snacks", emoji: "🍿" },
      { id: 13, name: "Haldiram Aloo Bhujia 400g", price: 110, cat: "snacks", emoji: "🥜" },
      { id: 14, name: "Parle-G Biscuit", price: 10, cat: "snacks", emoji: "🍪" },
      { id: 15, name: "Good Day Butter Cookies", price: 35, cat: "snacks", emoji: "🍪" },
      { id: 16, name: "Tata Tea Premium 250g", price: 130, cat: "beverages", emoji: "☕" },
      { id: 17, name: "Nescafe Classic 50g", price: 195, cat: "beverages", emoji: "☕" },
      { id: 18, name: "Bournvita 500g", price: 265, cat: "beverages", emoji: "🥛" },
      { id: 19, name: "Surf Excel 1kg", price: 185, cat: "daily", emoji: "🧴" },
      { id: 20, name: "Vim Dishwash Bar", price: 45, cat: "daily", emoji: "🫧" },
      { id: 21, name: "Colgate Toothpaste 200g", price: 95, cat: "daily", emoji: "🦷" },
      { id: 22, name: "Dettol Soap", price: 55, cat: "daily", emoji: "🧼" },
    ];

    function App() {
      const [cart, setCart] = useState({});
      const [activeCat, setActiveCat] = useState("all");
      const [search, setSearch] = useState("");
      const [showCart, setShowCart] = useState(false);
      const [customerName, setCustomerName] = useState("");
      const [customerAddr, setCustomerAddr] = useState("");
      const [ordered, setOrdered] = useState(false);

      const filtered = products.filter(p => {
        const matchCat = activeCat === "all" || p.cat === activeCat;
        const matchSearch = p.name.toLowerCase().includes(search.toLowerCase());
        return matchCat && matchSearch;
      });

      const cartItems = Object.entries(cart).filter(([_, qty]) => qty > 0);
      const totalItems = cartItems.reduce((sum, [_, qty]) => sum + qty, 0);
      const totalPrice = cartItems.reduce((sum, [id, qty]) => {
        const p = products.find(p => p.id === +id);
        return sum + (p ? p.price * qty : 0);
      }, 0);

      const addToCart = (id) => setCart(c => ({ ...c, [id]: (c[id] || 0) + 1 }));
      const removeFromCart = (id) => setCart(c => ({ ...c, [id]: Math.max((c[id] || 0) - 1, 0) }));

      const sendWhatsApp = () => {
        if (cartItems.length === 0) return;
        let msg = `🛒 *Naya Order - ${STORE_NAME}*\n\n`;
        if (customerName) msg += `👤 Naam: ${customerName}\n`;
        if (customerAddr) msg += `📍 Pata: ${customerAddr}\n`;
        msg += `\n📦 *Order Details:*\n`;
        cartItems.forEach(([id, qty]) => {
          const p = products.find(p => p.id === +id);
          if (p) msg += `${p.emoji} ${p.name} × ${qty} = ₹${p.price * qty}\n`;
        });
        msg += `\n💰 *Kul Raqam: ₹${totalPrice}*\n\nKripya confirm karein! 🙏`;
        const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
        window.open(url, "_blank");
        setOrdered(true);
      };

      return (
        <div style={{
          fontFamily: "'Trebuchet MS', sans-serif",
          background: "linear-gradient(135deg, #fef9f0 0%, #fff8e8 100%)",
          minHeight: "100vh",
          maxWidth: 480,
          margin: "0 auto",
          position: "relative",
          boxShadow: "0 0 40px rgba(0,0,0,0.15)"
        }}>
          {/* Header */}
          <div style={{
            background: "linear-gradient(135deg, #2d5016 0%, #3d6b1f 100%)",
            padding: "20px 16px 16px",
            position: "sticky", top: 0, zIndex: 100,
            boxShadow: "0 4px 20px rgba(45,80,22,0.4)"
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontSize: 11, color: "#a8d87a", letterSpacing: 2, textTransform: "uppercase", marginBottom: 2 }}>Aapka Bharosa</div>
                <div style={{ color: "white", fontWeight: 700, fontSize: 20, lineHeight: 1.1 }}>{STORE_NAME}</div>
                <div style={{ color: "#c5e88a", fontSize: 12, marginTop: 3 }}>🕐 Subah 7 baje - Raat 10 baje</div>
              </div>
              <button onClick={() => setShowCart(!showCart)} style={{
                background: showCart ? "#ff6b35" : "#a8d87a",
                border: "none", borderRadius: 12, padding: "10px 16px",
                cursor: "pointer", position: "relative", display: "flex", alignItems: "center", gap: 6,
                fontWeight: 700, fontSize: 14, color: showCart ? "white" : "#2d5016",
                transition: "all 0.3s", boxShadow: "0 4px 15px rgba(0,0,0,0.2)"
              }}>
                {showCart ? "← Wapas" : "🛒 Cart"}
                {totalItems > 0 && !showCart && (
                  <span style={{
                    background: "#ff4444", color: "white", borderRadius: "50%",
                    width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 11, fontWeight: 700, position: "absolute", top: -8, right: -8,
                    boxShadow: "0 2px 8px rgba(255,68,68,0.5)"
                  }}>{totalItems}</span>
                )}
              </button>
            </div>
            {!showCart && (
              <div style={{ marginTop: 12 }}>
                <input value={search} onChange={e => setSearch(e.target.value)}
                  placeholder="🔍 Koi cheez dhundho..."
                  style={{
                    width: "100%", padding: "10px 14px", borderRadius: 10,
                    border: "none", fontSize: 14, background: "rgba(255,255,255,0.15)",
                    color: "white", outline: "none", boxSizing: "border-box",
                  }}
                />
              </div>
            )}
          </div>

          {!showCart ? (
            <>
              {/* Categories */}
              <div style={{ padding: "12px 16px", overflowX: "auto", display: "flex", gap: 8, scrollbarWidth: "none" }}>
                {categories.map(cat => (
                  <button key={cat.id} onClick={() => setActiveCat(cat.id)} style={{
                    flexShrink: 0, padding: "7px 14px", borderRadius: 20, border: "2px solid",
                    borderColor: activeCat === cat.id ? cat.color : "#e0d5c0",
                    background: activeCat === cat.id ? cat.color : "white",
                    color: activeCat === cat.id ? "white" : "#555",
                    fontWeight: 600, fontSize: 12, cursor: "pointer", transition: "all 0.25s",
                    boxShadow: activeCat === cat.id ? `0 4px 12px ${cat.color}44` : "none"
                  }}>{cat.label}</button>
                ))}
              </div>

              {/* Products */}
              <div style={{ padding: "0 16px 120px" }}>
                <div style={{ fontSize: 12, color: "#888", marginBottom: 10 }}>{filtered.length} items</div>
                {filtered.map(p => (
                  <div key={p.id} style={{
                    background: "white", borderRadius: 14, padding: "14px 16px",
                    marginBottom: 10, display: "flex", alignItems: "center", justifyContent: "space-between",
                    boxShadow: "0 2px 12px rgba(0,0,0,0.07)",
                    border: cart[p.id] > 0 ? "2px solid #a8d87a" : "2px solid transparent",
                    transition: "all 0.25s"
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{
                        width: 46, height: 46, borderRadius: 12, background: "#f5f0e8",
                        display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24
                      }}>{p.emoji}</div>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 14, color: "#2a2a2a" }}>{p.name}</div>
                        <div style={{ fontSize: 15, fontWeight: 700, color: "#2d5016", marginTop: 2 }}>₹{p.price}</div>
                      </div>
                    </div>
                    {cart[p.id] > 0 ? (
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <button onClick={() => removeFromCart(p.id)} style={{
                          width: 30, height: 30, borderRadius: 8, background: "#fee2e2",
                          border: "none", cursor: "pointer", fontSize: 16, color: "#cc3333", fontWeight: 700
                        }}>−</button>
                        <span style={{ fontWeight: 700, fontSize: 16, minWidth: 20, textAlign: "center" }}>{cart[p.id]}</span>
                        <button onClick={() => addToCart(p.id)} style={{
                          width: 30, height: 30, borderRadius: 8, background: "#2d5016",
                          border: "none", cursor: "pointer", fontSize: 16, color: "white", fontWeight: 700
                        }}>+</button>
                      </div>
                    ) : (
                      <button onClick={() => addToCart(p.id)} style={{
                        background: "#2d5016", color: "white", border: "none",
                        borderRadius: 10, padding: "8px 16px", cursor: "pointer",
                        fontWeight: 600, fontSize: 13
                      }}>+ Add</button>
                    )}
                  </div>
                ))}
              </div>
            </>
          ) : (
            <div style={{ padding: "16px 16px 120px" }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#2d5016", marginBottom: 16 }}>🛒 Aapka Cart</div>
              {cartItems.length === 0 ? (
                <div style={{ textAlign: "center", padding: 40, color: "#aaa" }}>
                  <div style={{ fontSize: 48 }}>🛒</div>
                  <div style={{ marginTop: 8 }}>Cart khaali hai!</div>
                  <button onClick={() => setShowCart(false)} style={{
                    marginTop: 16, background: "#2d5016", color: "white", border: "none",
                    borderRadius: 10, padding: "10px 20px", cursor: "pointer", fontWeight: 600
                  }}>Products Dekhein</button>
                </div>
              ) : (
                <>
                  {cartItems.map(([id, qty]) => {
                    const p = products.find(p => p.id === +id);
                    if (!p) return null;
                    return (
                      <div key={id} style={{
                        background: "white", borderRadius: 12, padding: "12px 16px",
                        marginBottom: 8, display: "flex", alignItems: "center", justifyContent: "space-between",
                        boxShadow: "0 2px 8px rgba(0,0,0,0.06)"
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <span style={{ fontSize: 22 }}>{p.emoji}</span>
                          <div>
                            <div style={{ fontWeight: 600, fontSize: 13 }}>{p.name}</div>
                            <div style={{ fontSize: 12, color: "#888" }}>₹{p.price} × {qty}</div>
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <button onClick={() => removeFromCart(+id)} style={{
                            width: 26, height: 26, borderRadius: 6, background: "#fee2e2",
                            border: "none", cursor: "pointer", fontSize: 14, color: "#cc3333"
                          }}>−</button>
                          <span style={{ fontWeight: 700, minWidth: 18, textAlign: "center" }}>{qty}</span>
                          <button onClick={() => addToCart(+id)} style={{
                            width: 26, height: 26, borderRadius: 6, background: "#e8f5d0",
                            border: "none", cursor: "pointer", fontSize: 14, color: "#2d5016"
                          }}>+</button>
                          <span style={{ fontWeight: 700, color: "#2d5016", minWidth: 55, textAlign: "right", fontSize: 14 }}>
                            ₹{p.price * qty}
                          </span>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{ background: "white", borderRadius: 12, padding: 16, marginTop: 12, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                    <div style={{ fontWeight: 600, marginBottom: 10, color: "#333" }}>📋 Aapki Jaankari (optional)</div>
                    <input value={customerName} onChange={e => setCustomerName(e.target.value)}
                      placeholder="Aapka naam"
                      style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #e0d5c0", fontSize: 14, boxSizing: "border-box", marginBottom: 8, outline: "none" }}
                    />
                    <input value={customerAddr} onChange={e => setCustomerAddr(e.target.value)}
                      placeholder="Ghar ka pata / mohalla"
                      style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #e0d5c0", fontSize: 14, boxSizing: "border-box", outline: "none" }}
                    />
                  </div>
                  <div style={{
                    background: "#2d5016", borderRadius: 12, padding: 16, marginTop: 12,
                    display: "flex", justifyContent: "space-between", alignItems: "center"
                  }}>
                    <div>
                      <div style={{ color: "#a8d87a", fontSize: 12 }}>Kul Raqam</div>
                      <div style={{ color: "white", fontWeight: 700, fontSize: 24 }}>₹{totalPrice}</div>
                    </div>
                    <div style={{ color: "#c5e88a", fontSize: 13 }}>{totalItems} items</div>
                  </div>
                </>
              )}
            </div>
          )}

          {/* Bottom Button */}
          {cartItems.length > 0 && (
            <div style={{
              position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
              width: "100%", maxWidth: 480, padding: "12px 16px",
              background: "linear-gradient(to top, white 70%, transparent)",
              boxSizing: "border-box", zIndex: 200
            }}>
              {ordered ? (
                <div style={{
                  background: "#25D366", color: "white", borderRadius: 14, padding: "16px 20px",
                  textAlign: "center", fontWeight: 700, fontSize: 15,
                  boxShadow: "0 4px 20px rgba(37,211,102,0.4)"
                }}>
                  ✅ WhatsApp khul raha hai! Order bhej dijiye 🙏
                </div>
              ) : (
                <button onClick={() => { setShowCart(true); sendWhatsApp(); }} style={{
                  width: "100%", background: "linear-gradient(135deg, #25D366 0%, #128C7E 100%)",
                  color: "white", border: "none", borderRadius: 14, padding: "16px 20px",
                  fontSize: 16, fontWeight: 700, cursor: "pointer",
                  boxShadow: "0 4px 20px rgba(37,211,102,0.4)", display: "flex",
                  alignItems: "center", justifyContent: "center", gap: 10
                }}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                    <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.12 1.527 5.855L0 24l6.335-1.508A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.851 0-3.587-.5-5.089-1.373l-.361-.214-3.762.895.936-3.659-.237-.378A9.966 9.966 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
                  </svg>
                  WhatsApp pe Order Karo — ₹{totalPrice}
                </button>
              )}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
